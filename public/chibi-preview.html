<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Chibi Cat Preview</title>
<style>
  body { background: #1a1a2e; display: flex; flex-direction: column; align-items: center;
         justify-content: center; min-height: 100vh; margin: 0; font-family: sans-serif; }
  h2   { color: #c9b1e8; margin-bottom: 24px; font-size: 1.1rem; letter-spacing: 0.05em; }
  .hint { color: #7a6a8a; font-size: 0.8rem; margin-top: 16px; }
</style>
</head>
<body>
<h2>🐱 Proceriq Mascot — Interactive Chibi Cat</h2>
<div id="root"></div>
<p class="hint">Move cursor near cat to trigger wave · Hover belly for tickle · Click to wave</p>
<script type="module">
// Standalone vanilla JS version for preview
const svg = `
<svg id="cat" width="220" height="220" viewBox="0 0 200 200" style="overflow:visible;cursor:pointer" xmlns="http://www.w3.org/2000/svg">
<defs>
  <radialGradient id="bg" cx="50%" cy="40%" r="55%"><stop offset="0%" stop-color="#fff9f5"/><stop offset="100%" stop-color="#f0e8e0"/></radialGradient>
  <radialGradient id="ch" cx="50%" cy="50%" r="50%"><stop offset="0%" stop-color="#ffb3c1" stop-opacity="0.9"/><stop offset="100%" stop-color="#ff8fa3" stop-opacity="0.4"/></radialGradient>
  <filter id="soft"><feGaussianBlur stdDeviation="1.5"/></filter>
  <style>
    @keyframes breathe{0%,100%{transform:scale(1)}50%{transform:scale(1.025)}}
    @keyframes sparkle{from{opacity:0.5;transform:scale(0.85) rotate(-10deg)}to{opacity:1;transform:scale(1.1) rotate(10deg)}}
    #body-ellipse{animation:breathe 3s ease-in-out infinite;transform-origin:100px 148px}
  </style>
</defs>
<!-- Shadow -->
<ellipse cx="100" cy="192" rx="38" ry="6" fill="#d0c4bb" opacity="0.35"/>
<!-- Tail -->
<path id="tail" d="M 128 158 Q 160 145 165 168 Q 170 185 148 182" fill="none" stroke="#e0d4cc" stroke-width="9" stroke-linecap="round"/>
<!-- Body -->
<ellipse id="body-ellipse" cx="100" cy="148" rx="44" ry="40" fill="url(#bg)" stroke="#ddd0c8" stroke-width="2"/>
<!-- Belly -->
<ellipse id="belly" cx="100" cy="152" rx="26" ry="22" fill="#fff5f0" opacity="0.7"/>
<!-- Left arm -->
<g id="left-arm" style="transform-origin:68px 138px">
  <ellipse cx="62" cy="150" rx="13" ry="10" fill="url(#bg)" stroke="#ddd0c8" stroke-width="1.5" transform="rotate(-20,62,150)"/>
  <circle cx="56" cy="155" r="2" fill="#e8d8d0"/><circle cx="61" cy="158" r="2" fill="#e8d8d0"/><circle cx="66" cy="156" r="2" fill="#e8d8d0"/>
</g>
<!-- Right arm -->
<ellipse cx="138" cy="150" rx="13" ry="10" fill="url(#bg)" stroke="#ddd0c8" stroke-width="1.5" transform="rotate(20,138,150)"/>
<circle cx="132" cy="156" r="2" fill="#e8d8d0"/><circle cx="137" cy="159" r="2" fill="#e8d8d0"/><circle cx="142" cy="157" r="2" fill="#e8d8d0"/>
<!-- Feet -->
<ellipse cx="86" cy="186" rx="16" ry="9" fill="url(#bg)" stroke="#ddd0c8" stroke-width="1.5"/>
<ellipse cx="114" cy="186" rx="16" ry="9" fill="url(#bg)" stroke="#ddd0c8" stroke-width="1.5"/>
<!-- Head -->
<circle cx="100" cy="95" r="50" fill="url(#bg)" stroke="#ddd0c8" stroke-width="2"/>
<!-- Ears -->
<polygon points="62,60 54,36 78,52" fill="url(#bg)" stroke="#ddd0c8" stroke-width="1.5"/>
<polygon points="64,58 57,40 76,53" fill="#f5b8c4" opacity="0.6"/>
<polygon points="138,60 146,36 122,52" fill="url(#bg)" stroke="#ddd0c8" stroke-width="1.5"/>
<polygon points="136,58 143,40 124,53" fill="#f5b8c4" opacity="0.6"/>
<!-- Cheeks -->
<ellipse cx="74" cy="102" rx="13" ry="9" fill="url(#ch)" filter="url(#soft)"/>
<ellipse cx="126" cy="102" rx="13" ry="9" fill="url(#ch)" filter="url(#soft)"/>
<!-- Eyes -->
<g id="left-eye"><ellipse id="le" cx="83" cy="90" rx="7" ry="7" fill="#3a2e2e"/><circle id="ls" cx="85.5" cy="87.5" r="2.5" fill="white"/></g>
<g id="right-eye"><ellipse id="re" cx="117" cy="90" rx="7" ry="7" fill="#3a2e2e"/><circle id="rs" cx="119.5" cy="87.5" r="2.5" fill="white"/></g>
<!-- Nose -->
<ellipse cx="100" cy="102" rx="3.5" ry="2.5" fill="#c4808a"/>
<!-- Mouth -->
<path id="mouth" d="M 93 108 Q 100 113 107 108" fill="none" stroke="#c4808a" stroke-width="1.5" stroke-linecap="round"/>
<!-- Sparkles (hidden) -->
<text id="sp1" x="42" y="80" font-size="14" opacity="0" style="animation:sparkle 0.6s ease-in-out infinite alternate">✨</text>
<text id="sp2" x="148" y="68" font-size="10" opacity="0" style="animation:sparkle 0.4s ease-in-out infinite alternate">⭐</text>
<!-- Sweat (hidden) -->
<g id="sweat" opacity="0">
  <path d="M 148 72 Q 151 65 154 72" fill="#a8d8ea"/>
  <ellipse cx="151" cy="74" rx="4" ry="5" fill="#a8d8ea"/>
</g>
</svg>`

document.getElementById('root').innerHTML = svg
const catEl = document.getElementById('cat')
const leftEye = document.getElementById('le'), rightEye = document.getElementById('re')
const leftShine = document.getElementById('ls'), rightShine = document.getElementById('rs')
const leftArm = document.getElementById('left-arm')
const mouth = document.getElementById('mouth')
const sweat = document.getElementById('sweat')
const sp1 = document.getElementById('sp1'), sp2 = document.getElementById('sp2')
const belly = document.getElementById('belly')

let state = 'idle', waveTimer = null, tickleTimer = null, blinkTimer = null

function setEyes(ry) {
  leftEye.setAttribute('ry', ry); rightEye.setAttribute('ry', ry)
  leftShine.style.opacity = ry < 2 ? 0 : 1; rightShine.style.opacity = ry < 2 ? 0 : 1
}

// Blink
setInterval(() => {
  setEyes(1)
  setTimeout(() => setEyes(7), 140)
}, 2800 + Math.random() * 1500)

// Tail swish
let tailT = 0
setInterval(() => {
  tailT += 0.04
  const y = Math.sin(tailT) * 8
  document.getElementById('tail').setAttribute('d',
    `M 128 158 Q ${160+y} ${145-y*0.5} ${165+y*0.3} ${168+y} Q ${170} ${185+y*0.5} ${148} 182`)
}, 50)

function returnIdle() {
  setTimeout(() => {
    state = 'idle'
    leftArm.style.transform = 'rotate(0deg)'
    sp1.style.opacity = '0'; sp2.style.opacity = '0'
    sweat.style.opacity = '0'
    mouth.setAttribute('d', 'M 93 108 Q 100 113 107 108')
    mouth.setAttribute('fill', 'none')
    setEyes(7)
    catEl.style.transform = ''
  }, 2200)
}

function wave() {
  if (state === 'ticklish') return
  state = 'waving'
  sp1.style.opacity = '1'; sp2.style.opacity = '1'
  let t = 0, wt = setInterval(() => {
    t += 0.25
    leftArm.style.transform = `rotate(${Math.sin(t*3)*35-20}deg)`
    if (t > 6) { clearInterval(wt); returnIdle() }
  }, 40)
}

function tickle() {
  if (state === 'waving') return
  state = 'ticklish'
  sweat.style.opacity = '0.9'
  setEyes(2)
  mouth.setAttribute('d', 'M 91 109 Q 100 118 109 109')
  mouth.setAttribute('fill', '#c4808a')
  let t = 0, wt = setInterval(() => {
    t += 0.3
    catEl.style.transform = `rotate(${Math.sin(t*8)*5}deg)`
    if (t > 5) { clearInterval(wt); returnIdle() }
  }, 30)
}

catEl.addEventListener('click', wave)
belly.addEventListener('mouseenter', tickle)

// Mouse tracking
document.addEventListener('mousemove', e => {
  const r = catEl.getBoundingClientRect()
  const cx = r.left + r.width/2, cy = r.top + r.height/2
  const dx = e.clientX - cx, dy = e.clientY - cy
  const dist = Math.sqrt(dx*dx+dy*dy)
  const norm = Math.min(dist, 200)/200
  const ex = (dx/(dist||1))*4*norm, ey = (dy/(dist||1))*4*norm
  leftEye.setAttribute('cx', 83+ex); rightEye.setAttribute('cx', 117+ex)
  leftEye.setAttribute('cy', 90+ey); rightEye.setAttribute('cy', 90+ey)
  leftShine.setAttribute('cx', 85.5+ex); rightShine.setAttribute('cx', 119.5+ex)
  leftShine.setAttribute('cy', 87.5+ey); rightShine.setAttribute('cy', 87.5+ey)
  if (dist < 140 && state === 'idle') wave()
})
</script>
</body>
</html>
